# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/deploy.yml
# AddictIQ — Social Media Addiction Predictor
# CI/CD Pipeline using GitHub Actions → Render
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD — Train, Test & Deploy

# ── TRIGGER ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ── ENVIRONMENT VARIABLES ─────────────────────────────────────────────────────
env:
  PYTHON_VERSION: "3.11"

# ── JOBS ──────────────────────────────────────────────────────────────────────
jobs:

  # ────────────────────────────────────────────
  # JOB 1: CI — Train, Evaluate & Test
  # ────────────────────────────────────────────
  ci:
    name: 🧠 Train · Evaluate · Test
    runs-on: ubuntu-latest

    steps:
      # STEP 1 — Checkout code
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # STEP 2 — Set up Python
      - name: 🐍 Set Up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # STEP 3 — Install dependencies
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # STEP 4 — Lint (basic syntax check)
      - name: 🔍 Lint Python Files
        run: |
          pip install pyflakes
          python -m pyflakes train_model.py app.py

      # STEP 5 — Train the model
      - name: 🏋️ Train ML Model
        run: python train_model.py

      # STEP 6 — Verify artefacts exist
      - name: ✅ Verify model.pkl is Created
        run: |
          if [ ! -f "model.pkl" ]; then
            echo "ERROR: model.pkl was not created!"
            exit 1
          fi
          echo "model.pkl found ($(wc -c < model.pkl) bytes)"

      - name: ✅ Verify metrics.json is Created
        run: |
          if [ ! -f "metrics.json" ]; then
            echo "ERROR: metrics.json was not created!"
            exit 1
          fi
          echo "metrics.json content:"
          python -c "
          import json
          with open('metrics.json') as f:
              m = json.load(f)
          print('Best model:', m['best_model'])
          for name, r in m['model_results'].items():
              print(f\"  {name}: accuracy={r['accuracy']:.4f}\")
          "

      # STEP 7 — Basic Flask health check
      - name: 🌐 Flask App Health Check
        run: |
          # Start Flask in background
          FLASK_DEBUG=false python app.py &
          APP_PID=$!
          sleep 4   # wait for startup

          # Hit health endpoint
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health check FAILED — HTTP $HTTP_STATUS"
            kill $APP_PID
            exit 1
          fi
          echo "Health check PASSED — HTTP $HTTP_STATUS"

          # Hit predict endpoint with sample payload
          PREDICT_STATUS=$(curl -s -o /tmp/pred.json -w "%{http_code}" \
            -X POST http://localhost:5000/predict \
            -H "Content-Type: application/json" \
            -d '{"daily_usage_time":7,"screen_time":9,"number_of_apps_used":14,"sleep_hours":5}')
          echo "Predict response:"
          cat /tmp/pred.json

          # Hit metrics endpoint
          METRICS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/metrics)
          echo "Metrics endpoint — HTTP $METRICS_STATUS"

          kill $APP_PID

          if [ "$PREDICT_STATUS" != "200" ]; then
            echo "Predict endpoint FAILED — HTTP $PREDICT_STATUS"
            exit 1
          fi
          echo "All endpoint checks PASSED ✓"

      # STEP 8 — Upload artefacts for deployment job
      - name: 📤 Upload Build Artefacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artefacts
          path: |
            model.pkl
            metrics.json
          retention-days: 7

  # ────────────────────────────────────────────
  # JOB 2: CD — Deploy to Render (main only)
  # ────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # Download built artefacts from CI job
      - name: 📥 Download Build Artefacts
        uses: actions/download-artifact@v4
        with:
          name: model-artefacts

      # Trigger Render deploy via API
      - name: 🚀 Trigger Render Deployment
        env:
          RENDER_API_KEY:     ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID:  ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "Triggering deployment on Render service $RENDER_SERVICE_ID ..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}')

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "201" ]; then
            echo "Render deploy trigger FAILED — HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Render deployment triggered successfully!"

      - name: 🏁 Deployment Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  AddictIQ — Deployment Complete"
          echo "  Branch : main"
          echo "  Commit : ${{ github.sha }}"
          echo "  Actor  : ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
